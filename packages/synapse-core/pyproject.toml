[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "synapse-core"
version = "0.1.0"
description = "Synapse Core SDK — identity, trust, and security primitives for AI agents."
authors = [{ name = "Jai Sogani" }]
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[tool.setuptools.packages.find]
include = ["synapse*"]
namespaces = true
